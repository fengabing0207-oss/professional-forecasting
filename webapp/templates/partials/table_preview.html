{% if rows %}
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          {% for key in rows[0].keys() %}
            <th>{{ key }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
          <tr>
            {% for value in row.values() %}
              <td>{{ value }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <p class="muted">No data yet.</p>
{% endif %}
